services:
  pipeline:
    build: .
    ports:
      - "${PIPELINE_PORT:-8000}:${PIPELINE_PORT:-8000}"
    environment:
      - PIPELINE_OUTPUT_DIR=/app/experiments
      - PIPELINE_API_DB_PATH=/app/db/api.db
      - PIPELINE_DB_URL=postgresql://pipeline:pipeline_password@postgres:5432/pipeline_db
      - PIPELINE_PORT=${PIPELINE_PORT:-8000}
    volumes:
      # Mount experiments directory for persistent storage
      - ./experiments:/app/experiments
      # Mount data directory for datasets (writable for MNIST download on first run)
      - ../data:/app/data
      # Mount networks for network file access
      - ..:/app/project:ro
      # Persistent database
      - pipeline_db:/app/db
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pipeline
      - POSTGRES_PASSWORD=pipeline_password
      - POSTGRES_DB=pipeline_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pipeline_db: # Keep for SQLite backward compatibility or remove if strictly migrating
  postgres_data:
